<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MedCare – Register</title>
    <link rel="stylesheet" href="login.css"/>
    <style>
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: white;
        }
        select:focus { border-color: #1a73e8; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">🏥</div>
        <h1>Create Account</h1>
        <p class="subtitle">Join MedCare Hospital</p>

        <div id="error-msg" class="error-msg hidden"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Your full name"/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Your email"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create password"/>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="phone" placeholder="Phone number"/>
        </div>
        <div class="form-group">
            <label>Blood Group</label>
            <select id="bloodGroup">
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
        </div>

        <button class="btn-primary" onclick="register()">Create Account</button>
        <p class="footer-text">Already have an account? <a href="login.html">Sign In</a></p>
    </div>
</div>
<script src="register.js"></script>
</body>
</html>
